<!-- login.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · BlackPears</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>

<body class="login-body">
    <div id="particles-js"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-cube"></i>
                    <span>Black<span class="pears">Pears</span></span>
                </div>
                <h2>Acceso a la plataforma</h2>
                <p>Ingresa tus credenciales</p>
            </div>
            <form class="login-form" action="#" method="post">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn-primary btn-block">Ingresar <i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="register-link">¿No tienes cuenta? <a href="#">Contacta a tu administrador</a></p>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 60, density: { enable: true, value_area: 800 } },
                    color: { value: '#b583df' },
                    shape: { type: 'circle' },
                    opacity: { value: 0.4, random: true },
                    size: { value: 2.5, random: true },
                    line_linked: { enable: true, distance: 120, color: '#b583df', opacity: 0.15, width: 1 },
                    move: { enable: true, speed: 1.5, direction: 'none', random: true, out_mode: 'out' }
                },
                interactivity: {
                    events: {
                        onhover: { enable: true, mode: 'repulse' },
                        onclick: { enable: true, mode: 'push' }
                    },
                    modes: {
                        repulse: { distance: 80 },
                        push: { particles_nb: 3 }
                    }
                },
                retina_detect: true
            });
        });
    </script>
</body>

</html>
