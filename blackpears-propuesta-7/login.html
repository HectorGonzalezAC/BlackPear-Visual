<!-- login.html-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackPears | Acceso Clientes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="login-page">
    <div id="particles-js"></div>

    <header>
        <nav class="navbar">
            <div class="logo">BLACKPEARS</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#quienes-somos">Quiénes Somos</a></li>
                <li><a href="index.html#especialidades">Especialidades</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
                <li><a href="login.html">Acceder</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <h2>Acceso Clientes</h2>
            <form>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="cliente@empresa.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Iniciar sesión</button>
                <div class="login-links">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <a href="#">Solicitar acceso</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div>
                <div class="footer-logo">BLACKPEARS</div>
                <p style="color: #b694e0; max-width: 300px;">Consultoría + Formación SAP.</p>
            </div>
            <div class="footer-links">
                <div class="footer-column">
                    <h4>Enlaces</h4>
                    <ul>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="index.html#contacto">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="copyright">
            &copy; 2025 BlackPears Consulting. Todos los derechos reservados.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": ["#b380ff", "#9f6ee7"] },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2.5, "random": true },
                "line_linked": { "enable": true, "color": "#9f6ee7", "opacity": 0.2 },
                "move": { "enable": true, "speed": 1, "random": true }
            },
            "interactivity": {
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }
                }
            }
        });
    </script>
</body>

</html>
