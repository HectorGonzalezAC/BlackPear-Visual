<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackPears · Acceso Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="particles-canvas"></canvas>

    <div class="content login-content">
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">BLACKPEARS</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="index.html#plataforma">Plataforma</a></li>
                    <li><a href="index.html#soluciones">Soluciones</a></li>
                    <li><a href="index.html#video">Video</a></li>
                    <li><a href="index.html#recursos">Recursos</a></li>
                    <li><a href="index.html#contacto">Contacto</a></li>
                    <li><a href="login.html" class="btn-outline active">Acceso Clientes</a></li>
                </ul>
            </div>
        </nav>

        <main class="login-main">
            <div class="login-card">
                <h2>Acceso a clientes</h2>
                <p>Ingrese con sus credenciales para ver el dashboard y soporte</p>

                <form class="login-form">
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="cliente@empresa.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Iniciar sesión</button>
                </form>

                <p class="register-prompt">
                    ¿Eres nuevo? <a href="#">Solicita acceso aquí</a>
                </p>
            </div>
        </main>

        <footer class="footer login-footer">
            <p>© 2025 BlackPears Consulting · Soporte 24/7</p>
        </footer>
    </div>

    <script src="particles.js"></script>
</body>

</html>
